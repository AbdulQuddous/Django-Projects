{% extends 'base.html' %}

{% block title %}Post Detail{% endblock %}

{% block content %}
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>

    <a href="{% url 'list_view' %}">Back to Posts</a>
    <a href="{% url 'post_update' post.pk %}">Edit</a>
    <a href="{% url 'post_delete' post.pk %}">Delete</a>
{% endblock %}
