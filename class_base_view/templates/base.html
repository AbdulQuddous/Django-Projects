<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <h1>My Blog</h1>
        <nav>
            <ul>
                <li><a href="{% url 'list_view' %}">Home</a></li>
                <li><a href="{% url 'post_create' %}">Add Post</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Child templates will inject their content here -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; {{ year }} My Blog Project</p>
    </footer>
</body>
</html>
