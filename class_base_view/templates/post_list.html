{% extends 'base.html' %}

{% block title %}Post List{% endblock %}

{% block content %}
    <h2>All Posts</h2>
    <ul>
        {% for post in posts %}
            <li>
                <a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a>
            </li>
        {% empty %}
            <p>No posts available</p>
        {% endfor %}
    </ul>
{% endblock %}
