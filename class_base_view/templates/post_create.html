{% extends 'base.html' %}

{% block title %}
    {% if form.instance.pk %}Edit Post{% else %}Add Post{% endif %}
{% endblock %}

{% block content %}
    <h2>{% if form.instance.pk %}Edit Post{% else %}Add Post{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>

    <a href="{% url 'list_view' %}">Back to Posts</a>
{% endblock %}
